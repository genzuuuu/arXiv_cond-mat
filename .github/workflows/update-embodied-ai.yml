name: Update Embodied AI

on:
  schedule:
    # 每天 UTC 05:40（北京时间 13:40，工作日）
    - cron: '40 5 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-embodied-ai:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Generate embodied-ai digest and send email
      env:
        API_KEY: ${{ secrets.API_KEY }}
        BASE_URL: ${{ secrets.BASE_URL }}
        MODEL: ${{ secrets.MODEL }}
        EMAIL_TO: ${{ secrets.EMBODIED_EMAIL_TO }}
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        SMTP_FROM: ${{ secrets.SMTP_FROM }}
      run: |
        pip install -r requirements.txt
        python main.py \
          --profile embodied-ai \
          --api_key "${API_KEY}" \
          --base_url "${BASE_URL:-https://api.deepseek.com}" \
          --model "${MODEL:-deepseek-v4-flash}" \
          --send_email

    - name: Commit changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add embodied-ai/
        git diff --staged --quiet || git commit -m "Auto-update embodied-ai digest"
        git push
